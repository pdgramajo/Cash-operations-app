version: "3.8"

services:
  app:
    image: node:20-alpine
    container_name: cash-operations-app-dev
    working_dir: /app

    ports:
      - "5173:5173"

    volumes:
      - .:/app
      - cash-operations-app_node_modules:/app/node_modules
      - cash-operations-app_pnpm_store:/root/.local/share/pnpm

    environment:
      CHOKIDAR_USEPOLLING: "true"

    command: sh -c "corepack enable && pnpm install && pnpm run dev --host 0.0.0.0"

volumes:
  cash-operations-app_node_modules:
    name: cash-operations-app_node_modules

  cash-operations-app_pnpm_store:
    name: cash-operations-app_pnpm_store